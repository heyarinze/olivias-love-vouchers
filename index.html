<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Olivia's Love Vouchers</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f3f2ef;
    --grid: #e2e0db;
    --ink: #15181f;
    --ink-soft: #2a2d36;
    --coral: #ec4e2f;
    --voucher: #f8f6f1;
    --gift: #d9d6d0;
    --gift-icon: #ecebe7;
    --muted: #4a4d56;
    --shadow: 0 18px 30px -18px rgba(20, 22, 30, 0.18), 0 6px 12px -6px rgba(20, 22, 30, 0.1);
    --stamp: #c0392b;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  body {
    background-color: var(--bg);
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 56px 56px;
    background-position: -1px -1px;
    background-attachment: fixed;
  }

  .page {
    max-width: 880px;
    margin: 0 auto;
    padding: 56px 24px 96px;
  }

  h1.title {
    font-family: 'Archivo Black', 'Inter', sans-serif;
    font-weight: 900;
    font-size: clamp(2.4rem, 7vw, 4.6rem);
    letter-spacing: -0.01em;
    text-align: center;
    margin: 8px 0 18px;
    color: var(--ink);
    line-height: 0.95;
  }

  .ribbon-wrap {
    display: flex;
    justify-content: center;
    margin: 0 0 44px;
    filter: drop-shadow(0 6px 10px rgba(20, 22, 30, 0.18));
    position: relative;
    z-index: 101; /* above .intro overlay so the real ribbon stays visible */
  }

  .ribbon {
    background: var(--coral);
    color: #fff;
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(0.78rem, 1.5vw, 1.02rem);
    letter-spacing: 0.12em;
    padding: 12px 38px;
    text-transform: uppercase;
    white-space: nowrap;
    clip-path: polygon(
      18px 0,
      calc(100% - 18px) 0,
      100% 50%,
      calc(100% - 18px) 100%,
      18px 100%,
      0 50%
    );
  }

  /* Overlay covers the viewport in coral on load. The real ribbon (higher z-index)
     pokes through unchanged, so the user sees one continuous orange field with the
     ribbon text in its natural position. The clip-path then morphs from a viewport
     rectangle to the ribbon's chevron, retracting the surrounding orange. */
  .intro {
    position: fixed;
    inset: 0;
    background: var(--coral);
    z-index: 100;
    pointer-events: none;
    clip-path: polygon(0 0, 100% 0, 100% 50%, 100% 100%, 0 100%, 0 50%);
    -webkit-clip-path: polygon(0 0, 100% 0, 100% 50%, 100% 100%, 0 100%, 0 50%);
    transition: clip-path 1s cubic-bezier(0.7, 0, 0.25, 1),
                -webkit-clip-path 1s cubic-bezier(0.7, 0, 0.25, 1),
                opacity 0.35s ease;
  }
  .intro.gone { opacity: 0; }

  @media (max-width: 600px) {
    .ribbon {
      padding: 10px 22px;
      letter-spacing: 0.06em;
      font-size: 0.74rem;
    }
  }
  @media (max-width: 380px) {
    .ribbon {
      padding: 9px 18px;
      letter-spacing: 0.04em;
      font-size: 0.68rem;
    }
  }

  .voucher {
    display: grid;
    grid-template-columns: minmax(0, 1.6fr) minmax(0, 1fr);
    gap: 18px;
    margin-bottom: 28px;
    position: relative;
    transition: transform 0.22s ease;
  }

  @media (hover: hover) {
    .voucher:hover {
      transform: translateY(-8px);
    }
    .voucher:hover .ticket,
    .voucher:hover .gift {
      box-shadow: 0 30px 50px -20px rgba(20, 22, 30, 0.28), 0 14px 26px -10px rgba(20, 22, 30, 0.18);
    }
  }

  .ticket, .gift {
    background: var(--voucher);
    border-radius: 14px;
    box-shadow: var(--shadow);
    position: relative;
    transition: box-shadow 0.22s ease, opacity 0.25s ease;
  }

  .ticket {
    padding: 22px 24px 20px;
    overflow: hidden;
  }

  .ticket::before, .ticket::after {
    content: '';
    position: absolute;
    right: -11px;
    width: 22px;
    height: 22px;
    background: var(--bg);
    border-radius: 50%;
    z-index: 2;
  }
  .ticket::before { top: 50%; transform: translateY(-50%); }
  .ticket::after { display: none; }

  .ticket-top {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--ink-soft);
    font-size: 0.78rem;
    margin-bottom: 18px;
    font-weight: 500;
  }

  .ticket-top svg { flex-shrink: 0; }
  .ticket-top .accent { color: var(--coral); font-weight: 700; }

  .ticket h2 {
    font-family: 'Archivo Black', sans-serif;
    color: var(--coral);
    font-size: clamp(1.6rem, 3.6vw, 2.4rem);
    line-height: 0.98;
    margin: 6px 0 14px;
    letter-spacing: -0.01em;
    text-transform: uppercase;
  }

  .valid {
    font-weight: 700;
    color: var(--ink);
    font-size: 0.92rem;
    margin: 0 0 18px;
  }

  .ticket-bottom {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .barcode {
    display: flex;
    align-items: end;
    gap: 1px;
    height: 32px;
    min-width: 0;
    flex: 0 1 auto;
    overflow: hidden;
    max-width: 100%;
  }
  .barcode i {
    display: block;
    width: 2px;
    background: var(--ink);
    height: 100%;
    flex-shrink: 0;
  }

  .sponsor {
    text-align: right;
    font-size: 0.78rem;
    color: var(--ink);
    min-width: 0;
    word-break: break-word;
  }
  .sponsor-label {
    font-weight: 800;
    letter-spacing: 0.04em;
  }
  .sponsor-name {
    font-weight: 700;
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }

  .gift {
    background: var(--gift);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 22px 18px 20px;
    text-align: center;
    position: relative;
  }

  .gift svg.box {
    width: 78px;
    height: 78px;
    color: var(--gift-icon);
  }

  .gift .percent {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -34%);
    font-family: 'Archivo Black', sans-serif;
    color: var(--coral);
    font-size: 1.45rem;
    line-height: 1;
    text-align: center;
  }
  .gift .percent small { display: block; font-size: 1.45rem; }

  .gift .footer {
    margin-top: 14px;
    font-size: 0.74rem;
    color: var(--muted);
  }

  .actions {
    grid-column: 1 / -1;
    display: flex;
    gap: 10px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  button.act {
    border: 1.5px solid var(--ink);
    background: transparent;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.84rem;
    padding: 9px 16px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }

  button.act:hover {
    background: var(--ink);
    color: var(--voucher);
  }

  button.act.primary {
    background: var(--coral);
    border-color: var(--coral);
    color: white;
  }
  button.act.primary:hover {
    background: #d23e21;
    border-color: #d23e21;
  }

  button.act.cashed {
    background: var(--ink);
    color: var(--voucher);
  }

  /* cashed-in state */
  .voucher.is-cashed .ticket,
  .voucher.is-cashed .gift {
    opacity: 0.55;
  }

  .voucher.is-cashed .ticket h2 {
    text-decoration: line-through;
    text-decoration-thickness: 3px;
    text-decoration-color: var(--ink-soft);
  }

  .stamp {
    position: absolute;
    top: 10px;
    right: 14px;
    transform: rotate(-14deg);
    border: 3px solid var(--stamp);
    color: var(--stamp);
    font-family: 'Archivo Black', sans-serif;
    font-size: 0.82rem;
    letter-spacing: 0.08em;
    padding: 4px 10px;
    border-radius: 6px;
    opacity: 0;
    pointer-events: none;
    text-transform: uppercase;
    transition: opacity 0.25s ease;
    background: rgba(255, 255, 255, 0.6);
    z-index: 3;
  }
  .voucher.is-cashed .stamp { opacity: 1; }

  .reset {
    display: block;
    margin: 36px auto 0;
    background: transparent;
    border: 0;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.8rem;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .reset:hover { color: var(--ink); }

  @media (max-width: 600px) {
    .page { padding: 28px 14px 64px; }
    h1.title { margin: 4px 0 14px; }
    .voucher { grid-template-columns: minmax(0, 1.45fr) minmax(0, 1fr); gap: 10px; margin-bottom: 22px; }
    .ticket { padding: 14px 16px; }
    .gift { padding: 14px 10px; }
    .gift svg.box { width: 60px; height: 60px; }
    .gift .percent { font-size: 1.05rem; }
    .gift .percent small { font-size: 1.05rem; }
    .gift .footer { font-size: 0.62rem; line-height: 1.25; }
    .ticket-top { font-size: 0.68rem; margin-bottom: 12px; gap: 6px; }
    .ticket h2 { font-size: 1.3rem; line-height: 1; margin: 4px 0 10px; word-break: break-word; }
    .valid { font-size: 0.82rem; margin: 0 0 14px; }
    .ticket-bottom { gap: 10px; }
    .sponsor { font-size: 0.7rem; }
    .sponsor-label { font-size: 0.62rem; }
    .barcode { height: 26px; }
    .actions { gap: 6px; padding-top: 0; margin-top: 0; }
    button.act { font-size: 0.72rem; padding: 7px 11px; gap: 5px; }
    .stamp { font-size: 0.7rem; padding: 3px 8px; top: 8px; right: 10px; }
  }
  @media (max-width: 380px) {
    .page { padding: 24px 12px 56px; }
    .voucher { grid-template-columns: minmax(0, 1.5fr) minmax(0, 1fr); gap: 8px; }
    .ticket { padding: 12px 14px; }
    .gift { padding: 12px 8px; }
    .gift svg.box { width: 52px; height: 52px; }
    .gift .percent { font-size: 0.92rem; }
    .gift .percent small { font-size: 0.92rem; }
    .ticket h2 { font-size: 1.1rem; }
    .ticket-bottom { flex-direction: column; align-items: flex-start; gap: 8px; }
    .sponsor { text-align: left; }
    button.act { font-size: 0.68rem; padding: 6px 10px; }
  }
</style>
</head>
<body>
  <div class="intro" id="intro" aria-hidden="true"></div>
  <main class="page">
    <h1 class="title">OLIVIA'S LOVE VOUCHERS</h1>
    <div class="ribbon-wrap"><div class="ribbon">Know that you are loved...always</div></div>

    <div id="vouchers"></div>

    <button class="reset" id="resetBtn">reset all vouchers</button>
  </main>

<script>
  const NICOLE = { name: 'Nicole', phone: '+19292044203' };
  const ESTHER = { name: 'Esther', phone: '+12024944352' };
  const ARINZE = { name: 'Arinze', phone: '+16505092374' };
  const ALIX   = { name: 'Alix',   phone: '+12409100500' };
  const MAXIMA = { name: 'Maxima', phone: '+256779114334' };
  // displayed as the group, but routes to Esther
  const SUPPORT_GROUP = { name: "Olivia's Support Group", phone: '+12024944352' };

  const VOUCHERS = [
    { id: 'movie',     title: 'Movie Night with Friends',  sponsors: [NICOLE] },
    { id: 'comingout', title: 'Coming Out Party',          sponsors: [ESTHER] },
    { id: 'nigerian',  title: 'Igbo Dinner',               sponsors: [ARINZE] },
    { id: 'crysesh',   title: 'Silent Work and Cry Sesh',  sponsors: [ALIX]   },
    { id: 'walkyap',   title: 'Walk + Yap',                sponsors: [NICOLE] },
    { id: 'manipedis', title: 'Mani Pedis',                sponsors: [NICOLE, ARINZE] },
    { id: '420sesh',   title: '420 Sesh',                  sponsors: [ARINZE] },
    { id: 'highlight', title: 'Relationship Highlight Reel Watch Party', sponsors: [ESTHER] },
    { id: 'vinaka',    title: 'Vinaka Vaka Levu Day',       sponsors: [SUPPORT_GROUP] },
    { id: 'gymsesh',   title: 'Gym Sesh',                   sponsors: [MAXIMA] },
    { id: 'winesesh',  title: 'Wine Sesh',                  sponsors: [MAXIMA] },
    { id: 'nightin',   title: 'Night In & Laugh/Cry',       sponsors: [MAXIMA] },
    { id: 'facetime',  title: 'Facetime Vent Sesh',         sponsors: [ESTHER] },
    { id: 'wildcard',  title: "Something We Didn't Think About", sponsors: [ESTHER],
      body: "hi {name} <3 cashing in my wildcard love voucher — there's actually something i'd love that wasn't on the list..." },
  ];

  const STORAGE_KEY = 'olivia-love-vouchers-v1';

  function loadState() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    } catch { return {}; }
  }

  function saveState(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  function getCashed(id) { return !!(state[id] && state[id].cashed); }
  function setCashed(id, val) {
    state[id] = { ...(state[id] || {}), cashed: val };
    saveState(state);
  }

  // SVG bits
  const scanIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="3" y1="12" x2="21" y2="12"/></svg>`;

  const giftSvg = `<svg class="box" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round"><path d="M14 38h72v50H14z"/><path d="M10 28h80v10H10z"/><path d="M50 28v60"/><path d="M50 28c-6-10-22-12-22-2 0 6 10 8 22 2z"/><path d="M50 28c6-10 22-12 22-2 0 6-10 8-22 2z"/></svg>`;

  function makeBarcode() {
    const widths = [];
    let str = '';
    for (let i = 0; i < 38; i++) {
      const w = (Math.random() * 4 + 1) | 0;
      str += `<i style="width:${w}px"></i>`;
    }
    return `<div class="barcode">${str}</div>`;
  }

  function render() {
    const container = document.getElementById('vouchers');
    container.innerHTML = '';
    VOUCHERS.forEach(v => {
      const cashed = getCashed(v.id);
      const multi = v.sponsors.length > 1;
      const sponsorNames = v.sponsors.map(s => s.name.toUpperCase()).join(' + ');
      const textButtons = v.sponsors.map((s, i) =>
        `<button class="act primary" data-action="text" data-id="${v.id}" data-sponsor="${i}">text ${s.name}</button>`
      ).join('');
      const div = document.createElement('div');
      div.className = 'voucher' + (cashed ? ' is-cashed' : '');
      div.innerHTML = `
        <div class="ticket">
          <div class="stamp">cashed in</div>
          <div class="ticket-top">${scanIcon}<span>ping the sponsor to cash in your <span class="accent">love coupon</span></span></div>
          <h2>${v.title}</h2>
          <p class="valid">Valid for life</p>
          <div class="ticket-bottom">
            ${makeBarcode()}
            <div class="sponsor">
              <div class="sponsor-label">SPONSOR${multi ? 'S' : ''}:</div>
              <div class="sponsor-name">${sponsorNames}</div>
            </div>
          </div>
        </div>
        <div class="gift">
          ${giftSvg}
          <div class="percent">100%<small>OFF</small></div>
          <div class="footer">from Olivia's Support Group</div>
        </div>
        <div class="actions">
          ${textButtons}
          <button class="act ${cashed ? 'cashed' : ''}" data-action="toggle" data-id="${v.id}">
            ${cashed ? '✓ cashed in — undo' : 'mark as cashed in'}
          </button>
        </div>
      `;
      container.appendChild(div);
    });
  }

  function openTextFor(v, sponsorIdx) {
    const s = v.sponsors[sponsorIdx];
    if (!s || !s.phone) return;
    const raw = v.body
      ? v.body.replace(/\{name\}/g, s.name)
      : `hi ${s.name} <3 i'm cashing in my "${v.title}" love voucher — when works for you?`;
    const body = encodeURIComponent(raw);
    // sms: protocol; iOS uses ?&body=, Android uses ?body=. Both accept ?&body= reasonably.
    window.location.href = `sms:${s.phone}?&body=${body}`;
  }

  // delegated clicks
  document.getElementById('vouchers').addEventListener('click', e => {
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;
    const id = btn.dataset.id;
    const v = VOUCHERS.find(x => x.id === id);
    if (!v) return;
    if (btn.dataset.action === 'text') {
      openTextFor(v, parseInt(btn.dataset.sponsor, 10));
    } else if (btn.dataset.action === 'toggle') {
      setCashed(id, !getCashed(id));
      render();
    }
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    if (!confirm('reset all vouchers? this clears cashed-in marks.')) return;
    localStorage.removeItem(STORAGE_KEY);
    state = {};
    render();
  });

  render();

  // Intro: full-viewport orange that retracts to the ribbon's exact shape.
  // The real ribbon stays in place throughout (higher z-index); only the
  // overlay's clip-path animates from a viewport rectangle to the ribbon's
  // chevron at the ribbon's coordinates. Works the same on mobile and web.
  (function runIntro() {
    const intro = document.getElementById('intro');
    const ribbon = document.querySelector('.ribbon');
    if (!intro || !ribbon) return;

    const start = async () => {
      // Wait for fonts so the ribbon's measured size is final
      try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch {}

      // Hold the full-viewport orange briefly so it reads as "the page is orange"
      setTimeout(() => {
        const r = ribbon.getBoundingClientRect();
        const chev = 18; // matches .ribbon clip-path indent
        const yMid = (r.top + r.bottom) / 2;
        const poly =
          `polygon(${r.left + chev}px ${r.top}px, ` +
          `${r.right - chev}px ${r.top}px, ` +
          `${r.right}px ${yMid}px, ` +
          `${r.right - chev}px ${r.bottom}px, ` +
          `${r.left + chev}px ${r.bottom}px, ` +
          `${r.left}px ${yMid}px)`;
        intro.style.clipPath = poly;
        intro.style.webkitClipPath = poly;

        // Once the orange has retracted to ribbon-shape, fade out and remove.
        // Both shapes are identical in position/colour so there's no visible flash.
        setTimeout(() => {
          intro.classList.add('gone');
          setTimeout(() => intro.remove(), 400);
        }, 1050);
      }, 650);
    };

    if (document.readyState === 'complete') start();
    else window.addEventListener('load', start, { once: true });
  })();
</script>
</body>
</html>
